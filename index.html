<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Zen Hall | Resonance Sync</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
        }
        #overlay {
            position: relative;
            z-index: 10;
            text-align: center;
            cursor: pointer;
            transition: opacity 0.8s ease;
            user-select: none;
        }
        h1 {
            font-weight: 200;
            letter-spacing: 8px;
            text-transform: uppercase;
            opacity: 0.7;
            font-size: 1.2rem;
        }
        p {
            font-weight: 300;
            opacity: 0.4;
            font-size: 0.9rem;
            margin-top: 20px;
        }
        .hidden { opacity: 0 !important; pointer-events: none; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>Digital Zen Hall</h1>
        <p>Click to Enter Resonance State<br>[ Please wear headphones ]</p>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const BASE_F = 200.0;
        const DELTA_F = 20.0; 
        let audioCtx = null;
        let isRunning = false;

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById(' able-overlay'); // 修正ID

        // 修正：直接使用 overlay 变量
        const overlayDiv = document.getElementById('overlay');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        async function startResonance() {
            if (isRunning) return;
            
            try {
                // 1. 初始化音频上下文
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                // --- 左声道合成 ---
                const oscL = audioCtx.createOscillator();
                const gainL = audioCtx.createGain();
                const panL = audioCtx.createStereoPanner();
                
                oscL.type = 'sine';
                oscL.frequency.setValueAtTime(BASE_F, audioCtx.currentTime);
                gainL.gain.setValueAtTime(0.1, audioCtx.currentTime);
                panL.pan.setValueAtTime(-1, audioCtx.currentTime); // 强制左耳

                const gainR = audioCtx.createGain();
                const panR = audioCtx.createStereoPanner();

                oscR.frequency.setValueAtTime(BASE_F + DELTA_F, audioCtx.currentTime);
                gainR.gain.setValueAtTime(0.1, audioCtx.currentTime);
                panR.pan.setValueAtTime(1, audioCtx.currentTime); // 强制右耳
